<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>David Puzzlr – Install</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #FFB800; --gold-bright: #FFD700; --gold-deep: #E08000; --black: #000000;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 60%, rgba(255,184,0,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 30% 20% at 20% 80%, rgba(255,140,0,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 30% 20% at 80% 80%, rgba(255,140,0,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .sparks { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .spark {
      position: absolute; width: 2px; height: 2px;
      background: var(--gold-bright); border-radius: 50%;
      animation: floatUp linear infinite; opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 1; } 90%  { opacity: 0.6; }
      100% { transform: translateY(-120vh) translateX(var(--dx)) scale(0.3); opacity: 0; }
    }
    .card {
      position: relative; z-index: 10;
      background: linear-gradient(160deg, #1a1400 0%, #0d0d0d 40%, #0a0a00 100%);
      border: 1px solid rgba(255,184,0,0.25); border-radius: 20px;
      padding: 36px 40px; width: min(460px, 92vw);
      box-shadow: 0 0 0 1px rgba(255,184,0,0.08), 0 0 40px rgba(255,184,0,0.12),
        0 0 80px rgba(255,120,0,0.06), inset 0 1px 0 rgba(255,220,80,0.12);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 12%; right: 12%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
      border-radius: 2px; filter: blur(1px);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .logo-thumb {
      width: 58px; height: 58px; border-radius: 16px; object-fit: cover; flex-shrink: 0;
      box-shadow: 0 0 18px rgba(255,184,0,0.45), 0 4px 12px rgba(0,0,0,0.7);
      animation: iconPulse 3s ease-in-out infinite; background: #000;
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 18px rgba(255,184,0,0.45), 0 4px 12px rgba(0,0,0,0.7); }
      50%       { box-shadow: 0 0 32px rgba(255,184,0,0.8), 0 4px 16px rgba(0,0,0,0.7); }
    }
    .brand-text { flex: 1; }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;
      background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold-deep) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .brand-sub { font-size: 10px; color: rgba(255,184,0,0.45); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,184,0,0.2), transparent); margin-bottom: 24px; }
    .install-label { font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,184,0,0.45); margin-bottom: 6px; }
    .install-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 3px; line-height: 0.95;
      background: linear-gradient(180deg, #FFE566 0%, #FFB800 55%, #C87000 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px; filter: drop-shadow(0 0 12px rgba(255,184,0,0.3));
    }
    .install-desc { font-size: 13px; color: rgba(255,184,0,0.45); letter-spacing: 0.5px; margin-bottom: 28px; line-height: 1.5; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,184,0,0.06); border: 1px solid rgba(255,184,0,0.15);
      border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 600;
      letter-spacing: 1px; color: rgba(255,184,0,0.6); text-transform: uppercase;
    }
    .badge svg { width: 12px; height: 12px; opacity: 0.7; }
    .download-btn {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      width: 100%; padding: 18px 24px;
      background: linear-gradient(135deg, #FFD700 0%, #FFB800 50%, #E08000 100%);
      border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px;
      color: #000; text-decoration: none;
      box-shadow: 0 0 24px rgba(255,184,0,0.4), 0 6px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,200,0.3);
      transition: all 0.2s ease; position: relative; overflow: hidden;
    }
    .download-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg); transition: left 0.5s ease;
    }
    .download-btn:hover::before { left: 160%; }
    .download-btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(255,184,0,0.65), 0 10px 32px rgba(0,0,0,0.6); }
    .download-btn:active { transform: translateY(1px); }
    .btn-icon {
      width: 28px; height: 28px; background: rgba(0,0,0,0.2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-icon svg { width: 16px; height: 16px; }
    .progress-wrap { margin-top: 16px; display: none; }
    .progress-wrap.active { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,184,0,0.5); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .progress-bar { height: 4px; background: rgba(255,184,0,0.1); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold-deep), var(--gold-bright)); border-radius: 4px; box-shadow: 0 0 8px rgba(255,184,0,0.6); transition: width 0.4s ease; }
    .foot-note { margin-top: 20px; text-align: center; font-size: 10px; color: rgba(255,184,0,0.25); letter-spacing: 1.5px; text-transform: uppercase; }
  </style>
</head>
